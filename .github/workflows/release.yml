name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.0)'
        required: true
        default: '0.1.0'
      prerelease:
        description: '标记为预发布'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = "${{ github.event.inputs.version }}"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json -Encoding UTF8

      - name: Build & Package
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        shell: pwsh
        run: Get-ChildItem -Path release -Recurse -File | Select-Object FullName, Length

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: AutoWSGR-GUI v${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.zip
          body: |
            ## AutoWSGR-GUI v${{ github.event.inputs.version }}

            ### 使用方法
            1. 下载 `AutoWSGR-GUI-*-portable.exe`（免安装版）或 `AutoWSGR-GUI-*-Setup.exe`（安装版）
            2. 软件已内置 Python 3.12，无需单独安装
            3. 首次运行时程序会自动安装 Python 依赖（需联网）

            ### 系统要求
            - Windows 10/11 x64
            - 网络连接（首次运行需安装 pip 依赖）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
